<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Hello World | 经典开场</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0b1120 0%, #19233c 50%, #2a3b5c 100%);
            font-family: system-ui, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
            overflow-x: hidden;
        }

        /* 动态光晕背景装饰 */
        body::before {
            content: '';
            position: absolute;
            width: 150%;
            height: 150%;
            top: -25%;
            left: -25%;
            background: radial-gradient(circle at 30% 40%, rgba(255, 255, 255, 0.08) 0%, rgba(0, 0, 0, 0) 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* 主卡片容器 */
        .card {
            max-width: 680px;
            width: 100%;
            background: rgba(255, 255, 255, 0.97);
            backdrop-filter: blur(0px);
            border-radius: 3rem;
            padding: 2.8rem 2rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.35), 0 4px 12px rgba(0, 0, 0, 0.1);
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: fadeInUp 0.7s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            z-index: 2;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 35px 55px -15px rgba(0, 0, 0, 0.4);
        }

        /* 主标题 */
        .greeting {
            font-size: clamp(3rem, 12vw, 5.5rem);
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(125deg, #1f2a48, #2e3b5e, #1e2b46);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.75rem;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.05);
            display: inline-block;
            transition: all 0.2s;
        }

        /* 装饰性波浪下划线 */
        .title-underline {
            width: 100px;
            height: 4px;
            background: linear-gradient(90deg, #6c8db0, #a3c2e0, #6c8db0);
            margin: 1rem auto 1.2rem auto;
            border-radius: 4px;
            opacity: 0.8;
        }

        /* 副文本描述 */
        .sub-message {
            font-size: 1.2rem;
            color: #2c3e4e;
            font-weight: 500;
            margin-bottom: 1rem;
            letter-spacing: -0.2px;
        }

        .welcome-text {
            font-size: 1rem;
            color: #4a627a;
            line-height: 1.5;
            max-width: 450px;
            margin: 0 auto 1.6rem auto;
            font-weight: 400;
        }

        /* 优雅分割装饰 */
        .divider {
            width: 70px;
            height: 2px;
            background: #cbdbe6;
            margin: 1.8rem auto 1.2rem auto;
            border-radius: 2px;
        }

        /* 引语或经典名言 */
        .quote {
            font-style: italic;
            font-size: 0.95rem;
            color: #5a6e82;
            background: #f0f4fa;
            display: inline-block;
            padding: 0.4rem 1.2rem;
            border-radius: 60px;
            backdrop-filter: blur(2px);
            font-weight: 450;
            letter-spacing: 0.2px;
        }

        /* 小脚注 */
        .footer-note {
            margin-top: 2rem;
            font-size: 0.75rem;
            color: #7d8e9f;
            border-top: 1px solid #e2e8f0;
            padding-top: 1.5rem;
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .footer-note span {
            opacity: 0.7;
            transition: opacity 0.2s;
        }

        .footer-note span:hover {
            opacity: 1;
        }

        /* 可爱装饰微标 */
        .globe-icon {
            font-size: 2.2rem;
            display: inline-block;
            filter: drop-shadow(0 6px 8px rgba(0, 0, 0, 0.1));
            margin-bottom: 0.25rem;
            animation: gentleFloat 3s ease-in-out infinite;
        }

        /* 浮游动画 */
        @keyframes gentleFloat {
            0% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-6px);
            }
            100% {
                transform: translateY(0px);
            }
        }

        /* 卡片淡入上浮 */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 响应式调整 */
        @media (max-width: 520px) {
            .card {
                padding: 2rem 1.5rem;
                border-radius: 2rem;
            }
            .sub-message {
                font-size: 1rem;
            }
            .greeting {
                margin-bottom: 0.2rem;
            }
            .globe-icon {
                font-size: 1.8rem;
            }
            .footer-note {
                font-size: 0.7rem;
                gap: 0.6rem;
            }
        }

        /* 优雅选中效果 */
        ::selection {
            background: #b8d0f0;
            color: #0f172a;
        }

        /* 简单聚焦效果 */
        .card:focus-within {
            outline: none;
            box-shadow: 0 0 0 3px rgba(100, 150, 200, 0.5);
        }
    </style>
</head>
<body>
    <div class="card" tabindex="0" aria-label="Hello World 欢迎卡片">
        <!-- 装饰性地球图标（纯视觉） -->
        <div class="globe-icon" aria-hidden="true">🌐✨</div>

        <!-- 核心问候：Hello World -->
        <h1 class="greeting">Hello, World!</h1>
        <div class="title-underline" aria-hidden="true"></div>

        <p class="sub-message">✨ 欢迎来到前端世界 ✨</p>
        <p class="welcome-text">
            这是属于你的第一个网页 — 简洁、温暖、充满可能性。<br>
            每一段旅程都始于一声问候，愿你在这里写下无限精彩。
        </p>

        <div class="divider" aria-hidden="true"></div>

        <!-- 引语区块 -->
        <div class="quote">
            “ Code. Create. Celebrate. ”
        </div>

        <!-- 底部点缀信息 -->
        <div class="footer-note">
            <span>🌍 经典 Hello World</span>
            <span>⚡ 纯 HTML / CSS</span>
            <span>🎯 即刻启程</span>
        </div>
    </div>
</body>
</html>
